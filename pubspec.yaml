name: escola_conecta
description: App de comunicação escolar segura e privada.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0
  file_picker: ^8.0.0+1
  dio: ^5.4.3+1

    # ── Notificações ──────────────────────────────────────────────────────────
  # Firebase Core (necessário para FCM)
  firebase_core: ^3.3.0
  # Firebase Cloud Messaging — push notifications
  firebase_messaging: ^15.1.0
  # Notificações locais (exibir banners quando app está em foreground)
  flutter_local_notifications: ^17.2.2
  web: 1.1.1                        # Web push API nativa

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/