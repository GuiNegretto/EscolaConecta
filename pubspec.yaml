name: escola_conecta
description: App de comunicação escolar segura e privada.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & estado
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0
  file_picker: ^8.0.0+1
  dio: ^5.4.3+1
  package_info_plus: ^8.0.0
  open_filex: ^4.4.0
  flutter_pdfview: ^1.3.2
  video_player: ^2.8.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # ── Notificações ────────────────────────────────────────────────────────
  # Versões atualizadas para resolver channel-error do Firebase
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  web: ^1.1.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  web: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/